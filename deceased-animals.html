<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Scan for Animals · Bridge of Whispers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── GLOBAL RESET ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Inter',system-ui,sans-serif;background:#FDFAF5;color:#2C2317;-webkit-font-smoothing:antialiased;overflow-x:hidden}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
ul{list-style:none}


/* ══════════════════════════════════════════
   NAV (same as homepage)
══════════════════════════════════════════ */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 60px 0 20px;height:82px;
  background:rgba(253,250,245,0.96);
  backdrop-filter:blur(12px);
  border-bottom:1px solid #EDE4D6;
  box-shadow:0 2px 20px rgba(44,35,23,0.08);
}
.nav-logo{display:flex;align-items:center;gap:14px;transition:opacity .2s}
.nav-logo:hover{opacity:.9}
.nav-logo img{height:56px;width:auto;min-width:56px;object-fit:contain;object-position:left center;flex-shrink:0}
.nav-logo .logo-text{font-family:'Playfair Display',serif;font-size:20px;font-weight:500;letter-spacing:1.2px;color:#2C2317;line-height:1.2}
.nav-links{display:flex;align-items:center;gap:8px}
/* .nav-links a{
  padding:8px 16px;font-size:13px;font-weight:500;letter-spacing:.3px;
  color:#6B5744;border-radius:6px;transition:background .2s,color .2s;
} */

.nav-links a{
  padding:8px 16px;font-size:15px;font-weight:500;letter-spacing:.3px;
  color:black;border-radius:6px;transition:background .2s,color .2s;
}


.nav-links a:hover{background:#F0EBE2;color:#2C2317}
.nav-cta{
  padding:10px 24px !important;
  background:#5C7A5C !important;color:#fff !important;
  border-radius:50px !important;font-weight:600 !important;
  transition:background .2s,transform .2s,box-shadow .2s !important;
}
.nav-cta:hover{background:#4A6A4A !important;transform:translateY(-1px) !important;box-shadow:0 6px 20px rgba(92,122,92,.35) !important}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;background:none;border:none}
.hamburger span{display:block;width:22px;height:2px;background:#2C2317;border-radius:2px;transition:.3s}

/* ══════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:14px 30px;font-size:14px;font-weight:600;
  border-radius:50px;border:2px solid transparent;
  transition:all .25s;cursor:pointer;letter-spacing:.2px;
}
.btn-primary{background:#5C7A5C;color:#fff;border-color:#5C7A5C}
.btn-primary:hover{background:#4A6A4A;border-color:#4A6A4A;transform:translateY(-2px);box-shadow:0 8px 24px rgba(92,122,92,.35)}
.btn-secondary{background:transparent;color:#5C7A5C;border-color:#5C7A5C}
.btn-secondary:hover{background:#5C7A5C;color:#fff;transform:translateY(-2px)}

/* ══════════════════════════════════════════
   PAGE HERO (same as Animal Telepathy: image below header, overlay, no crop)
══════════════════════════════════════════ */
.page-hero{
  margin-top:72px;
  position:relative;
  height:520px; /* same nice height you liked */
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:transparent; /* remove cream fill */
}

.page-hero img{
  height:125%;
  width:auto;
  max-width:100%;
  object-fit:contain;
  display:block;
  margin:0 auto;
}

.page-hero::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(
    to top,
    rgba(44,35,23,.65) 0%,
    rgba(44,35,23,.2) 50%,
    transparent 100%
  );
  pointer-events:none;
}

.page-hero-inner{
  position:absolute;
  bottom:50px;
  left:50%;
  transform:translateX(-50%);
  max-width:900px;
  width:100%;
  padding:0 24px;
  text-align:center;
  z-index:2;
}

.page-hero .btn{margin:4px 6px}
.page-hero .btn-secondary{background:transparent;color:#fff;border-color:rgba(255,255,255,.8)}
.page-hero .btn-secondary:hover{background:rgba(255,255,255,.15);color:#fff;border-color:#fff}
.page-hero .btn-primary{background:#fff;color:#5C7A5C;border-color:#fff}
.page-hero .btn-primary:hover{background:rgba(255,255,255,.92);color:#4A6A4A;border-color:#fff}

.service-content{padding:80px 60px}
.service-wrap{max-width:900px;margin:0 auto}
.service-img{
  width:100%;max-height:480px;object-fit:cover;
  border-radius:24px;margin-bottom:48px;
  box-shadow:0 24px 60px rgba(44,35,23,.12);
}
.service-section{margin-bottom:56px}
.service-section h2{
  font-family:'Playfair Display',serif;font-size:32px;
  font-weight:500;color:#2C2317;margin-bottom:20px;
}
.service-section p{
  font-size:16px;line-height:1.9;color:#6B5744;margin-bottom:18px;
}
.service-section ul{margin:20px 0}
.service-section ul li{
  font-size:16px;line-height:1.9;color:#6B5744;
  padding:12px 0 12px 32px;position:relative;
  border-bottom:1px solid #F5EFE6;
}
.service-section ul li::before{
  content:'✓';position:absolute;left:0;
  color:#5C7A5C;font-weight:700;font-size:18px;
}

.cta-box{
  background:linear-gradient(135deg, #3D5C40 0%, #5C7A5C 100%);
  border-radius:24px;padding:48px;text-align:center;margin-top:64px;margin-bottom:56px;
}
.cta-box h3{
  font-family:'Playfair Display',serif;font-size:32px;
  font-weight:400;color:#fff;margin-bottom:16px;
}
.cta-box p{font-size:16px;color:rgba(255,255,255,.75);margin-bottom:28px}
.cta-box .btn-primary{background:#fff;color:#5C7A5C;border-color:#fff}
.cta-box .btn-primary:hover{background:rgba(255,255,255,.9)}

/* ══════════════════════════════════════════
   FOOTER (simplified)
══════════════════════════════════════════ */
footer{background:#2C2317;padding:48px 60px;text-align:center}
footer p{font-size:12px;color:rgba(255,255,255,.3)}

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media(max-width:900px){
  .nav{padding:0 24px}
  .nav-links{display:none}
  .hamburger{display:flex}
  .page-hero{min-height:38vh;padding:24px 20px 36px}
  .service-content{padding:60px 32px}
  footer{padding:36px 32px}
}
.nav-links.mobile-open{
  display:flex;flex-direction:column;position:fixed;
  top:72px;left:0;right:0;bottom:0;
  background:rgba(253,250,245,0.97);backdrop-filter:blur(16px);
  align-items:center;justify-content:center;gap:28px;z-index:999;
}
.nav-links.mobile-open a{font-size:20px;padding:10px 20px}
</style>
</head>
<body>

<!-- ══ NAV ══ -->
<nav class="nav" id="nav">
  <a href="index.html" class="nav-logo">
    <img src="assets/logo6.png" alt="Sacred Whispers — Animal Telepathic Communication">
    <!-- <span class="logo-text">Sacred Whispers</span> -->
  </a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="index.html#sessions">All Sessions</a></li>
    <li><a href="index.html#about">About</a></li>
    <li><a href="index.html?service=deceased-animals#book" class="nav-cta">Book Now</a></li>
  </ul>
  <button class="hamburger" id="menuBtn" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- ══ PAGE HERO (image like Animal Telepathy) ══ -->
<section class="page-hero" aria-label="Landscape Communication">
  <img src="assets/imagedeceasedheader2.png" 
       alt="Deceased Animal Communication Header Image">
  <!-- <div class="page-hero-inner">
    <h1>Deceased Communication</h1>
    <p class="page-hero-desc">
      Connect with your beloved companion who has crossed the Rainbow Bridge and find peace.
    </p>
    <a href="index.html#sessions" class="btn btn-secondary">← Back to All Offerings</a>
    <a href="index.html?service=deceased-animals#book" class="btn btn-primary">Book This Session</a>
  </div> -->
</section>

<!-- ══ SERVICE CONTENT - populated by JavaScript ══ -->
<section class="service-content">
  <div class="service-wrap">
    <img id="serviceImg" class="service-img" src="" alt="">
    
    <div class="service-section">
      <h2>What Is This Service?</h2>
      <div id="fullContent"></div>
    </div>

    <div class="service-section" id="benefitsSection">
      <h2>Benefits</h2>
      <ul id="benefitsList"></ul>
    </div>

    <div class="service-section" id="expectSection">
      <h2>What to Expect</h2>
      <ul id="expectList"></ul>
    </div>

    <div class="cta-box">
      <h3>Ready to Begin?</h3>
      <p>Book your session and let's connect with your beloved companion.</p>
      <a href="index.html?service=deceased-animals#book" class="btn btn-primary">Book This Session</a>
    </div>
  </div>
</section>

<!-- ══ FOOTER ══ -->
<footer>
  <p>© 2026 The Bridge of Whispers · All rights reserved</p>
</footer>

<script>
(function(){
  // Get service ID from URL (aura-scan.html → aura-scan)
  const serviceId = window.location.pathname.split('/').pop().replace('.html', '');
  
  // Load config and populate page
  fetch('services-config.json')
    .then(res => res.json())
    .then(config => {
      const service = config.specializedOfferings.find(s => s.id === serviceId);
      if (!service) {
        document.title = 'Service Not Found · Bridge of Whispers';
        return;
      }

      // Populate image
      //document.getElementById('serviceImg').src = service.image;
      //document.getElementById('serviceImg').alt = service.name;

      // Populate full content
      const contentDiv = document.getElementById('fullContent');
      service.fullContent.split('\n\n').forEach(para => {
        const p = document.createElement('p');
        p.textContent = para;
        contentDiv.appendChild(p);
      });

      // Populate benefits
      const benefitsList = document.getElementById('benefitsList');
      if (service.benefits && service.benefits.length) {
        service.benefits.forEach(benefit => {
          const li = document.createElement('li');
          li.textContent = benefit;
          benefitsList.appendChild(li);
        });
      } else {
        document.getElementById('benefitsSection').style.display = 'none';
      }

      // Populate what to expect
      const expectList = document.getElementById('expectList');
      if (service.whatToExpect && service.whatToExpect.length) {
        service.whatToExpect.forEach(item => {
          const li = document.createElement('li');
          li.textContent = item;
          expectList.appendChild(li);
        });
      } else {
        document.getElementById('expectSection').style.display = 'none';
      }

      // Update page title
      document.title = `${service.name} · Bridge of Whispers`;
    })
    .catch(err => {
      console.error('Failed to load service:', err);
      document.title = 'Error · Bridge of Whispers';
    });

  // Mobile menu
  var menuBtn = document.getElementById('menuBtn');
  var navLinks = document.getElementById('navLinks');
  menuBtn.addEventListener('click', function(){
    var open = navLinks.classList.toggle('mobile-open');
    document.body.style.overflow = open ? 'hidden' : '';
    menuBtn.children[0].style.transform = open ? 'rotate(45deg) translate(5px,5px)' : '';
    menuBtn.children[1].style.opacity = open ? '0' : '1';
    menuBtn.children[2].style.transform = open ? 'rotate(-45deg) translate(5px,-5px)' : '';
  });
  navLinks.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click', function(){
      navLinks.classList.remove('mobile-open');
      document.body.style.overflow = '';
      menuBtn.children[0].style.transform = '';
      menuBtn.children[1].style.opacity = '1';
      menuBtn.children[2].style.transform = '';
    });
  });
})();
</script>
</body>
</html>
